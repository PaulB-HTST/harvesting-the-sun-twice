[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Clean URLs — strip .html from links
[[redirects]]
  from = "/financial-model"
  to = "/financial-model.html"
  status = 200
[[redirects]]
  from = "/grid"
  to = "/grid.html"
  status = 200

[[redirects]]
  from = "/technology"
  to = "/technology.html"
  status = 200

[[redirects]]
